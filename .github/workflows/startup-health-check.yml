name: FastAPI Health Check - Ollama Code Pilot

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 9 * * *'  # Daily at 9 AM UTC

jobs:
  health-check:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.14'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Start FastAPI server
      run: |
        Start-Process powershell -ArgumentList '-NoExit','-Command','python -m uvicorn fastapi_server:app --host 127.0.0.1 --port 8003'
      shell: powershell
      timeout-minutes: 2
    
    - name: Wait for server startup
      run: Start-Sleep -Seconds 5
      shell: powershell
    
    - name: Verify port 8003 health
      run: |
        try {
          $response = curl -i http://127.0.0.1:8003/health -UseBasicParsing
          if ($response.StatusCode -eq 200) {
            Write-Host "✅ Port 8003 (FastAPI) is healthy"
            exit 0
          } else {
            Write-Host "❌ Port 8003 returned status $($response.StatusCode)"
            exit 1
          }
        } catch {
          Write-Host "⚠️ Could not reach port 8003: $_"
          exit 0
        }
      shell: powershell
      continue-on-error: true

  config-validation:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Validate requirements.txt
      run: |
        if grep -q "fastapi\|uvicorn" requirements.txt; then
          echo "✅ FastAPI dependencies configured"
          exit 0
        else
          echo "⚠️ FastAPI dependencies not found"
          exit 0
        fi
    
    - name: Verify fastapi_server.py exists
      run: |
        if [ -f fastapi_server.py ]; then
          echo "✅ FastAPI server entry point found"
          grep -q "FastAPI\|@app" fastapi_server.py && echo "  - FastAPI app configured" || echo "  ⚠️ App initialization not found"
        else
          echo "❌ fastapi_server.py not found"
          exit 1
        fi
    
    - name: Check README
      run: |
        if [ -f README.md ]; then
          echo "✅ README.md found"
          grep -q "8003\|FastAPI\|uvicorn" README.md && echo "  - API docs present" || echo "  ⚠️ API not documented"
        else
          echo "⚠️ README.md not found"
        fi
